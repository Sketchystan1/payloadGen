<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PayloadGen</title>
    <meta name="description" content="Payload generator.">
    <link rel="stylesheet" href="styles.css">
    <script defer src="crypto.js"></script>
    <script defer src="data.js"></script>
    <script defer src="generators.js"></script>
    <script defer src="app.js"></script>
</head>
<body>
    <main class="page-shell">
        <header class="page-header">
            <div class="page-header-row">
                <h1 id="page-title">PayloadGen</h1>
                <div class="header-actions">
                    <a id="donate-btn" class="btn btn-secondary" href="https://boosty.to/sketchystan1" target="_blank" rel="noreferrer noopener">
                        <span id="donate-btn-label">Donate</span>
                        <span class="btn-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M12 21s-6.7-4.3-9.5-8.1C.6 10.3 1 6.6 3.8 4.8c2.2-1.4 5-.8 6.7 1.2L12 7.8l1.5-1.8c1.7-2 4.5-2.6 6.7-1.2 2.8 1.8 3.2 5.5 1.3 8.1C18.7 16.7 12 21 12 21Z"></path>
                            </svg>
                        </span>
                    </a>
                    <div class="locale-toggle">
                        <button id="locale-toggle-btn" type="button" class="btn btn-ghost">EN / RU</button>
                    </div>
                </div>
            </div>

            <p id="page-intro" class="intro">
                Generate <code>i1..i5</code> payload.
            </p>
        </header>

        <section class="layout-grid">
            <!-- Payload blocks are created entirely in app.js so new types/options only need JS changes. -->
            <section id="blocks-panel" class="panel blocks-panel" aria-label="Payload blocks">
                <div id="payload-blocks" class="payload-blocks" aria-live="polite"></div>
            </section>

            <section class="panel output-panel" aria-labelledby="output-label">
                <div id="status-banner" class="status-banner" role="status" aria-live="polite">
                    Ready to generate payload lines.
                </div>
                <div class="toolbar">
                    <label class="field compact-field" for="mtu-input" style="flex-direction:row; align-items:center; gap:10px;">
                        <span id="mtu-label" class="field-label">Global MTU</span>
                        <input id="mtu-input" type="number" min="1" step="1" inputmode="numeric" value="1280">
                        <label class="inline-checkbox" style="margin-left:auto;">
                            <input id="pad-mtu-checkbox" type="checkbox">
                            <span id="pad-mtu-label" class="checkbox-label" style="font-weight:normal;">Pad to MTU</span>
                        </label>
                    </label>

                    <div class="button-row">
                        <button id="add-payload-btn" type="button" class="btn btn-ghost">Add Payload</button>
                        <button id="generate-btn" type="button" class="btn btn-primary">Generate</button>
                        <button id="copy-btn" type="button" class="btn btn-secondary">Copy Output</button>
                        <button id="reset-btn" type="button" class="btn btn-ghost">Reset</button>
                    </div>
                </div>
                <label class="field output-field" for="output-text">
                    <span id="output-label" class="field-label">Generated Output</span>
                    <textarea id="output-text" rows="16" readonly spellcheck="false" placeholder="Press Generate to build i1..i5 lines."></textarea>
                </label>
            </section>
        </section>
    </main>
</body>
</html>
